<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add New Car</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div id="navbar"></div>
    <script src="js/navbar.js"></script>

<div class="container mt-5">
  <h2 class="text-center mb-4">Add New Car</h2>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4 shadow">

        <form id="addCarForm">

          <div class="mb-3">
            <label class="form-label">Vehicle Model</label>
            <input type="text" id="vehicleModel" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Vehicle Number</label>
            <input type="text" id="vehicleNumber" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Seating Capacity</label>
            <input type="number" id="seatingCapacity" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Rent per Day</label>
            <input type="number" id="rentPerDay" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Image URL (optional)</label>
            <input type="text" id="imageUrl" class="form-control">
          </div>

          <button type="submit" class="btn btn-primary w-100">Add Car</button>

        </form>

      </div>
    </div>
  </div>
</div>
<script src="js/config.js">
  // const BASE_URL = "http://localhost:8089/api";
</script>
<script src="js/addCar.js"></script>

</body>
</html>
